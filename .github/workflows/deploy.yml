# Workflow para compilar y desplegar MagiFinance a GitHub Pages automáticamente
name: Desplegar a GitHub Pages

on:
  push:
    branches: ["main", "master"] # Ejecutar al hacer push a la rama principal

  # Permitir ejecución manual desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evitar despliegues concurrentes simultáneos
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar dependencias
        run: bun install

      - name: Compilar aplicación (Vite)
        run: bun run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto de compilación
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
